# CIDX Tool Presets
# This file defines all built-in tool configurations
# Edit this file during development - changes are picked up immediately with 'go run'
# During build, this file is embedded into the binary

[presets.prettier]
name = "prettier"
phase = "code"
image = "tmknom/prettier:latest"
command = "prettier --check ."
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]
config_files = [
    ".prettierrc",
    ".prettierrc.json",
    ".prettierrc.yml",
    "prettier.config.js",
]

[presets.prettier.options.write]
type = "bool"
default = false
description = "Write formatted files (instead of check)"
command_flag = "--write"

[presets.trivy]
name = "trivy"
phase = "security"
image = "aquasec/trivy:latest"
command = "fs /scan"
workdir = "/scan"
volumes = ["${WORKSPACE}:/scan"]

[presets.trivy.env]
TRIVY_CACHE_DIR = "/tmp/trivy-cache"

[presets.trivy.options.severity]
type = "string"
default = "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
description = "Severities to report (comma-separated)"
command_flag = "--severity"

[presets.trivy.options.exit_code]
type = "int"
default = 0
description = "Exit code when vulnerabilities are found"
command_flag = "--exit-code"

[presets.gitleaks]
name = "gitleaks"
phase = "security"
image = "zricethezav/gitleaks:latest"
command = "git ."
workdir = "/repo"
volumes = ["${WORKSPACE}:/repo"]
config_files = [".gitleaks.toml"]

[presets.commitlint]
name = "commitlint"
phase = "code"
image = "node:20-alpine"
command = "sh -c 'npm install -g @commitlint/cli @commitlint/config-conventional && commitlint --from ${FROM} --to ${TO}'"
workdir = "/app"
volumes = [
    "${WORKSPACE}:/app",
    "${WORKSPACE}/.git:/app/.git",
]
config_files = [
    ".commitlintrc.json",
    ".commitlintrc.yml",
    "commitlint.config.js",
]

[presets.commitlint.env]
FROM = "origin/main"
TO = "HEAD"

[presets.ansible-lint]
name = "ansible-lint"
phase = "code"
image = "quay.io/ansible/creator-ee:latest"
command = "ansible-lint"
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]
config_files = [".ansible-lint"]

[presets.molecule]
name = "molecule"
phase = "test"
image = "quay.io/ansible/molecule:latest"
command = "molecule test -s ${SCENARIO}"
workdir = "/work"
volumes = [
    "${WORKSPACE}:/work",
    "/var/run/docker.sock:/var/run/docker.sock",
]

[presets.molecule.env]
SCENARIO = "default"

[presets.molecule.options.scenario]
type = "string"
default = "default"
description = "Molecule scenario to run"
env_var = "SCENARIO"

[presets.test-hot-reload]
name = "test-hot-reload"
phase = "test"
image = "alpine:latest"
command = "echo 'Hot reload works!'"
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]

[presets.golangci-lint]
name = "golangci-lint"
phase = "code"
image = "golangci/golangci-lint:latest"
command = "golangci-lint run --timeout 5m"
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]
config_files = [".golangci.yml", ".golangci.yaml", ".golangci.toml", ".golangci.json"]

[presets.golangci-lint.env]
HOME = "/tmp"
GOLANGCI_LINT_CACHE = "/tmp/.cache"

[presets.golangci-lint.options.fix]
type = "bool"
default = false
description = "Automatically fix issues where possible"
command_flag = "--fix"

[presets.shellcheck]
name = "shellcheck"
phase = "code"
image = "koalaman/shellcheck:stable"
command = "sh -c 'find . -type f -name \"*.sh\" | xargs -r shellcheck || true'"
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]

[presets.shellcheck.options.severity]
type = "string"
default = "style"
description = "Minimum severity (error, warning, info, style)"
command_flag = "--severity"

[presets.gofmt]
name = "gofmt"
phase = "code"
image = "golang:alpine"
command = "gofmt -l ."
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.go-test]
name = "go-test"
phase = "test"
image = "golang:alpine"
command = "go test -v ./..."
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.go-test.env]
HOME = "/tmp"

[presets.go-test.options.coverage]
type = "bool"
default = false
description = "Generate coverage report"
command_flag = "-cover"

[presets.go-test.options.race]
type = "bool"
default = false
description = "Enable race detector"
command_flag = "-race"

[presets.go-build]
name = "go-build"
phase = "build"
image = "golang:alpine"
command = "go build -o bin/cidx ./cmd/cidx"
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.go-build.env]
HOME = "/tmp"

[presets.go-build.options.ldflags]
type = "string"
default = ""
description = "Linker flags for go build"
command_flag = "-ldflags"
