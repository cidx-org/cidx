# CIDX Tool Presets
# This file defines all built-in tool configurations
# Edit this file during development - changes are picked up immediately with 'go run'
# During build, this file is embedded into the binary

[presets.prettier]
name = "prettier"
phase = "code"
image = "tmknom/prettier:latest"
command = "prettier --check ."
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]
config_files = [
    ".prettierrc",
    ".prettierrc.json",
    ".prettierrc.yml",
    "prettier.config.js",
]

[presets.prettier.options.write]
type = "bool"
default = false
description = "Write formatted files (instead of check)"
command_flag = "--write"

[presets.trivy]
name = "trivy"
phase = "security"
image = "aquasec/trivy:latest"
command = "fs /scan"
workdir = "/scan"
volumes = ["${WORKSPACE}:/scan"]

[presets.trivy.env]
TRIVY_CACHE_DIR = "/tmp/trivy-cache"

[presets.trivy.options.severity]
type = "string"
default = "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
description = "Severities to report (comma-separated)"
command_flag = "--severity"

[presets.trivy.options.exit_code]
type = "int"
default = 0
description = "Exit code when vulnerabilities are found"
command_flag = "--exit-code"

[presets.gitleaks]
name = "gitleaks"
phase = "security"
image = "zricethezav/gitleaks:latest"
command = "git ."
workdir = "/repo"
volumes = ["${WORKSPACE}:/repo"]
config_files = [".gitleaks.toml"]

[presets.commitlint]
name = "commitlint"
phase = "code"
image = "node:20-alpine"
command = "sh -c 'npm install -g @commitlint/cli @commitlint/config-conventional && commitlint --from ${FROM} --to ${TO}'"
workdir = "/app"
volumes = [
    "${WORKSPACE}:/app",
    "${WORKSPACE}/.git:/app/.git",
]
config_files = [
    ".commitlintrc.json",
    ".commitlintrc.yml",
    "commitlint.config.js",
]

[presets.commitlint.env]
FROM = "origin/main"
TO = "HEAD"

[presets.commitizen]
name = "commitizen"
phase = "code"
image = "commitizen/commitizen:latest"
command = "check --rev-range ${FROM}..${TO}"
workdir = "/app"
volumes = [
    "${WORKSPACE}:/app",
    "${WORKSPACE}/.git:/app/.git",
]
config_files = [
    ".cz.toml",
    ".cz.json",
    "pyproject.toml",
]

[presets.commitizen.env]
FROM = "HEAD~10"
TO = "HEAD"

[presets.commitizen.options.from]
type = "string"
default = "HEAD~10"
description = "Start commit range"
env_var = "FROM"

[presets.commitizen.options.to]
type = "string"
default = "HEAD"
description = "End commit range"
env_var = "TO"

[presets.ansible-lint]
name = "ansible-lint"
phase = "code"
image = "quay.io/ansible/creator-ee:latest"
command = "ansible-lint"
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]
config_files = [".ansible-lint"]

[presets.molecule]
name = "molecule"
phase = "test"
image = "quay.io/ansible/molecule:latest"
command = "molecule test -s ${SCENARIO}"
workdir = "/work"
volumes = [
    "${WORKSPACE}:/work",
    "/var/run/docker.sock:/var/run/docker.sock",
]

[presets.molecule.env]
SCENARIO = "default"

[presets.molecule.options.scenario]
type = "string"
default = "default"
description = "Molecule scenario to run"
env_var = "SCENARIO"

[presets.test-hot-reload]
name = "test-hot-reload"
phase = "test"
image = "alpine:latest"
command = "echo 'Hot reload works!'"
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]

[presets.golangci-lint]
name = "golangci-lint"
phase = "code"
image = "golangci/golangci-lint:latest"
command = "golangci-lint run --timeout 5m"
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]
config_files = [".golangci.yml", ".golangci.yaml", ".golangci.toml", ".golangci.json"]

[presets.golangci-lint.env]
HOME = "/tmp"
GOLANGCI_LINT_CACHE = "/tmp/.cache"

[presets.golangci-lint.options.fix]
type = "bool"
default = false
description = "Automatically fix issues where possible"
command_flag = "--fix"

[presets.shellcheck]
name = "shellcheck"
phase = "code"
image = "koalaman/shellcheck:stable"
command = "sh -c 'find . -type f -name \"*.sh\" | xargs -r shellcheck || true'"
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]

[presets.shellcheck.options.severity]
type = "string"
default = "style"
description = "Minimum severity (error, warning, info, style)"
command_flag = "--severity"

[presets.gofmt]
name = "gofmt"
phase = "code"
image = "golang:alpine"
command = "gofmt -l ."
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.go-test]
name = "go-test"
phase = "test"
image = "golang:alpine"
command = "go test -v ./pkg/... ./cmd/..."
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.go-test.env]
HOME = "/tmp"

[presets.go-test.options.coverage]
type = "bool"
default = false
description = "Generate coverage report"
command_flag = "-cover"

[presets.go-test.options.race]
type = "bool"
default = false
description = "Enable race detector"
command_flag = "-race"

[presets.godog]
name = "godog"
phase = "test"
image = "golang:1.21-alpine"
command = "go test -v ./features_test.go"
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.godog.env]
HOME = "/tmp"
CGO_ENABLED = "0"

[presets.godog.options.format]
type = "string"
default = "pretty"
description = "Output format (pretty, progress, junit, cucumber)"
env_var = "GODOG_FORMAT"

[presets.godog.options.tags]
type = "string"
default = ""
description = "Tags to filter scenarios (@wip, @smoke, etc.)"
command_flag = "-tags"

[presets.go-build]
name = "go-build"
phase = "build"
image = "golang:alpine"
command = "sh -c 'VERSION=$(cat VERSION 2>/dev/null || echo dev); go build -ldflags \"-X main.Version=${VERSION} ${LDFLAGS}\" -o bin/cidx ./cmd/cidx'"
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.go-build.env]
HOME = "/tmp"
LDFLAGS = ""

[presets.go-build.options.ldflags]
type = "string"
default = ""
description = "Additional linker flags for go build"
env_var = "LDFLAGS"

# ============================================================================
# Docker Phase - Build and push container images
# ============================================================================

[presets.kaniko]
name = "kaniko"
phase = "docker"
image = "gcr.io/kaniko-project/executor:latest"
command = "--context=/workspace --dockerfile=Dockerfile --destination=${IMAGE_NAME}:${IMAGE_TAG} --cache=true"
workdir = "/workspace"
volumes = [
    "${WORKSPACE}:/workspace",
    "${HOME}/.docker:/kaniko/.docker:ro",
]
require_ci = false
local_behavior = "no-push"
privileged = true

[presets.kaniko.env]
IMAGE_NAME = "ghcr.io/${GITHUB_REPOSITORY}"
IMAGE_TAG = "latest"

[presets.kaniko.options.destination]
type = "string"
default = ""
description = "Full image destination (registry/image:tag)"
command_flag = "--destination"

[presets.kaniko.options.dockerfile]
type = "string"
default = "Dockerfile"
description = "Path to Dockerfile"
command_flag = "--dockerfile"

[presets.kaniko.options.cache]
type = "bool"
default = true
description = "Enable layer caching"
command_flag = "--cache"

[presets.docker-buildx]
name = "docker-buildx"
phase = "docker"
image = "docker:latest"
command = "sh -c 'docker buildx build --platform linux/amd64,linux/arm64 -t ${IMAGE_NAME}:${IMAGE_TAG} --push .'"
workdir = "/workspace"
volumes = [
    "${WORKSPACE}:/workspace",
    "/var/run/docker.sock:/var/run/docker.sock",
]
require_ci = false
local_behavior = "no-push"

[presets.docker-buildx.env]
HOME = "/tmp"
IMAGE_NAME = "ghcr.io/${GITHUB_REPOSITORY}"
IMAGE_TAG = "latest"

# ============================================================================
# Release Phase - Create GitHub releases and publish artifacts
# ============================================================================

[presets.gh-release]
name = "gh-release"
phase = "release"
image = "alpine:latest"
command = "sh -c 'apk add --no-cache git github-cli && git config --global --add safe.directory /workspace && gh release create ${TAG} ${ARTIFACTS} --generate-notes'"
workdir = "/workspace"
volumes = ["${WORKSPACE}:/workspace"]
require_ci = false
local_behavior = "draft"
privileged = true

[presets.gh-release.env]
TAG = "${GIT_TAG}"
ARTIFACTS = "bin/cidx"
GH_TOKEN = "${GITHUB_TOKEN}"

[presets.gh-release.options.draft]
type = "bool"
default = false
description = "Create release as draft"
command_flag = "--draft"

[presets.gh-release.options.prerelease]
type = "bool"
default = false
description = "Mark as prerelease"
command_flag = "--prerelease"

[presets.goreleaser]
name = "goreleaser"
phase = "release"
image = "goreleaser/goreleaser:latest"
command = "goreleaser release --clean"
workdir = "/workspace"
volumes = [
    "${WORKSPACE}:/workspace",
    "/var/run/docker.sock:/var/run/docker.sock",
]
require_ci = false
local_behavior = "draft"

[presets.goreleaser.env]
GITHUB_TOKEN = "${GITHUB_TOKEN}"

[presets.goreleaser.options.snapshot]
type = "bool"
default = false
description = "Build snapshot (without publishing)"
command_flag = "--snapshot"

[presets.goreleaser.options.skip_publish]
type = "bool"
default = false
description = "Skip publishing"
command_flag = "--skip=publish"
