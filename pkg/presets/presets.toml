# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║                      CIDX Built-in Container Presets                      ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
#
# This file defines all built-in container configurations embedded into cidx binary.
#
# 🐳 PHILOSOPHY: Container-First Approach
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CIDX maximizes use of dedicated Docker containers for each operation.
#
# Why containers?
# - ✅ Consistent execution (same behavior locally and in CI/CD)
# - ✅ No local installation required (just Docker)
# - ✅ Version pinning (specify exact container version via image tags)
# - ✅ Isolation (no conflicts between container dependencies)
# - ✅ Reproducibility (same results everywhere, every time)
#
# Preset Philosophy:
# - Prefer official Docker images (e.g., commitlint/commitlint)
# - Use vendor-maintained images when official isn't available
# - Avoid multi-step installations (npm install, apt-get, etc.)
# - Container should be ready-to-run with minimal setup
#
# Development:
# - Edit this file → Changes picked up with 'go run ./cmd/cidx'
# - Build → This file embedded into binary via go:embed
#
# Structure:
# - [presets.container-name]       : Main configuration
# - [presets.container-name.env]   : Environment variables
# - [presets.container-name.options.X] : Configurable options

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CODE QUALITY PHASE - Linting, formatting, and style enforcement
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Prettier: Auto-format code (JS, TS, JSON, YAML, Markdown, etc.)
# Official image: tmknom/prettier (community-maintained, widely used)
[presets.prettier]
name = "prettier"
phase = "code"
image = "tmknom/prettier:3.6.2"
command = "prettier --check ."
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]
config_files = [
    ".prettierrc",
    ".prettierrc.json",
    ".prettierrc.yml",
    "prettier.config.js",
]

[presets.prettier.options.write]
type = "bool"
default = false
description = "Write formatted files (instead of check)"
command_flag = "--write"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECURITY PHASE - Vulnerability scanning and secret detection
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Trivy: Container and filesystem vulnerability scanner
# Official image: aquasec/trivy (maintained by Aqua Security)
# Scans: dependencies, OS packages, misconfigurations, secrets
[presets.trivy]
name = "trivy"
phase = "security"
image = "aquasec/trivy:0.67.2"
command = "fs /scan"
workdir = "/scan"
volumes = ["${WORKSPACE}:/scan"]

[presets.trivy.env]
TRIVY_CACHE_DIR = "/tmp/trivy-cache"

[presets.trivy.options.severity]
type = "string"
default = "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
description = "Severities to report (comma-separated)"
command_flag = "--severity"

[presets.trivy.options.exit_code]
type = "int"
default = 0
description = "Exit code when vulnerabilities are found"
command_flag = "--exit-code"

# Gitleaks: Scan git history for secrets and credentials
# Official image: zricethezav/gitleaks (maintained by Gitleaks author)
# Detects: API keys, passwords, tokens in git history
[presets.gitleaks]
name = "gitleaks"
phase = "security"
image = "zricethezav/gitleaks:v8.30.0"
command = "git ."
workdir = "/repo"
volumes = ["${WORKSPACE}:/repo"]
config_files = [".gitleaks.toml"]

# Commitlint: Validate commit messages follow conventional commits
# Official image: commitlint/commitlint (official Docker image)
# ✅ Container-first: No npm install needed, image is ready-to-run
# Validates: commit message format (feat:, fix:, docs:, etc.)
[presets.commitlint]
name = "commitlint"
phase = "code"
image = "commitlint/commitlint:20.1.0"
command = "commitlint --from ${FROM} --to ${TO}"
workdir = "/app"
volumes = [
    "${WORKSPACE}:/app",
    "${WORKSPACE}/.git:/app/.git",
]
config_files = [
    ".commitlintrc.json",
    ".commitlintrc.yml",
    ".commitlintrc.yaml",
    "commitlint.config.js",
    "commitlint.config.cjs",
]

[presets.commitlint.env]
FROM = "origin/main"
TO = "HEAD"

# Commitizen: Validate commit messages and manage version bumping
# Official image: commitizen/commitizen (official Docker image)
# ✅ Container-first: Ready-to-run, no pip install needed
# Features: Validates commits, bumps versions, generates changelog
[presets.commitizen]
name = "commitizen"
phase = "code"
image = "commitizen/commitizen:4.10.0"
command = "check --rev-range ${FROM}..${TO}"
workdir = "/app"
volumes = [
    "${WORKSPACE}:/app",
    "${WORKSPACE}/.git:/app/.git",
]
config_files = [
    ".cz.toml",
    ".cz.json",
    "pyproject.toml",
]

[presets.commitizen.env]
FROM = "HEAD~10"
TO = "HEAD"

[presets.commitizen.options.from]
type = "string"
default = "HEAD~10"
description = "Start commit range"
env_var = "FROM"

[presets.commitizen.options.to]
type = "string"
default = "HEAD"
description = "End commit range"
env_var = "TO"

[presets.ansible-lint]
name = "ansible-lint"
phase = "code"
image = "quay.io/ansible/creator-ee:v24.2.0"
command = "ansible-lint"
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]
config_files = [".ansible-lint"]

[presets.molecule]
name = "molecule"
phase = "test"
image = "quay.io/ansible/molecule:25.11.1"
command = "molecule test -s ${SCENARIO}"
workdir = "/work"
volumes = [
    "${WORKSPACE}:/work",
    "/var/run/docker.sock:/var/run/docker.sock",
]

[presets.molecule.env]
SCENARIO = "default"

[presets.molecule.options.scenario]
type = "string"
default = "default"
description = "Molecule scenario to run"
env_var = "SCENARIO"

[presets.test-hot-reload]
name = "test-hot-reload"
phase = "test"
image = "alpine:3.22.2"
command = "echo 'Hot reload works!'"
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GO SECURITY - Go-specific security scanning
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Gosec: Go Security Checker - inspects Go source code for security issues
# Official image: securego/gosec (maintained by securego team)
# Detects: SQL injection, command injection, hardcoded credentials, etc.
[presets.gosec]
name = "gosec"
phase = "security"
image = "securego/gosec:2.22.10"
command = "./..."
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.gosec.env]
HOME = "/tmp"
GOTOOLCHAIN = "auto"

[presets.gosec.options.severity]
type = "string"
default = "medium"
description = "Minimum severity (low, medium, high)"
command_flag = "-severity"

[presets.gosec.options.confidence]
type = "string"
default = "medium"
description = "Minimum confidence (low, medium, high)"
command_flag = "-confidence"

[presets.gosec.options.format]
type = "string"
default = "text"
description = "Output format (text, json, csv, junit-xml, html, sarif, sonarqube)"
command_flag = "-fmt"

# Govulncheck: Official Go vulnerability scanner
# Official image: golang:alpine (installs govulncheck at runtime)
# Detects: Known vulnerabilities in Go dependencies (CVEs)
[presets.govulncheck]
name = "govulncheck"
phase = "security"
image = "golang:1.25.4-alpine"
command = "sh -c 'go install golang.org/x/vuln/cmd/govulncheck@latest && PATH=$PATH:/tmp/go/bin govulncheck ./...'"
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.govulncheck.env]
HOME = "/tmp"
GOPATH = "/tmp/go"
GOTOOLCHAIN = "auto"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# GO TOOLS - Linting, testing, and building Go projects
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Go Mod Tidy: Verify go.mod and go.sum are clean
# Official image: golang:alpine (official Go Docker image)
# Checks: go.mod is tidy (no unused deps, all required deps present)
[presets.go-mod-tidy]
name = "go-mod-tidy"
phase = "code"
image = "golang:1.25.4-alpine"
command = "sh -c 'cp go.mod go.mod.bak && cp go.sum go.sum.bak && go mod tidy && diff go.mod go.mod.bak && diff go.sum go.sum.bak && echo \"go.mod is tidy\"'"
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.go-mod-tidy.env]
HOME = "/tmp"
GOTOOLCHAIN = "auto"

# GolangCI-Lint: Fast Go linters aggregator
# Official image: golangci/golangci-lint (maintained by golangci-lint team)
# ✅ Container-first: Pre-configured with 50+ linters
# Runs: staticcheck, govet, errcheck, gosec, and many more
[presets.golangci-lint]
name = "golangci-lint"
phase = "code"
image = "golangci/golangci-lint:v2.6.2"
command = "golangci-lint run --timeout 5m"
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]
config_files = [".golangci.yml", ".golangci.yaml", ".golangci.toml", ".golangci.json"]

[presets.golangci-lint.env]
HOME = "/tmp"
GOLANGCI_LINT_CACHE = "/tmp/.cache"

[presets.golangci-lint.options.fix]
type = "bool"
default = false
description = "Automatically fix issues where possible"
command_flag = "--fix"

[presets.shellcheck]
name = "shellcheck"
phase = "code"
image = "koalaman/shellcheck:v0.11.0"
command = "sh -c 'find . -type f -name \"*.sh\" | xargs -r shellcheck || true'"
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]

[presets.shellcheck.options.severity]
type = "string"
default = "style"
description = "Minimum severity (error, warning, info, style)"
command_flag = "--severity"

[presets.gofmt]
name = "gofmt"
phase = "code"
image = "golang:1.25.4-alpine"
command = "gofmt -l ."
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.gofmt.env]
GOTOOLCHAIN = "auto"

# Go Test: Run Go unit and integration tests
# Official image: golang:alpine (official Go Docker image)
# ✅ Container-first: Full Go toolchain included
# Features: Run tests with coverage, race detection, benchmarks
[presets.go-test]
name = "go-test"
phase = "test"
image = "golang:1.25.4-alpine"
command = "go test -v ./pkg/... ./cmd/..."
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.go-test.env]
HOME = "/tmp"
GOTOOLCHAIN = "auto"

[presets.go-test.options.coverage]
type = "bool"
default = false
description = "Generate coverage report"
command_flag = "-cover"

[presets.go-test.options.race]
type = "bool"
default = false
description = "Enable race detector"
command_flag = "-race"

[presets.godog]
name = "godog"
phase = "test"
image = "golang:1.25.4-alpine"
command = "go test -v ./features_test.go"
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.godog.env]
HOME = "/tmp"
CGO_ENABLED = "0"
GOTOOLCHAIN = "auto"

[presets.godog.options.format]
type = "string"
default = "pretty"
description = "Output format (pretty, progress, junit, cucumber)"
env_var = "GODOG_FORMAT"

[presets.godog.options.tags]
type = "string"
default = ""
description = "Tags to filter scenarios (@wip, @smoke, etc.)"
command_flag = "-tags"

# Go Build: Compile Go binary with version injection
# Official image: golang:alpine (official Go Docker image)
# ✅ Container-first: Full Go compiler toolchain
# Features: Version injection from VERSION file, custom ldflags
[presets.go-build]
name = "go-build"
phase = "build"
image = "golang:1.25.4-alpine"
command = "sh -c 'VERSION=$(cat VERSION 2>/dev/null || echo dev); go build -ldflags \"-X main.Version=${VERSION} ${LDFLAGS}\" -o bin/cidx ./cmd/cidx'"
workdir = "/app"
volumes = ["${WORKSPACE}:/app"]

[presets.go-build.env]
HOME = "/tmp"
LDFLAGS = ""
GOTOOLCHAIN = "auto"

[presets.go-build.options.ldflags]
type = "string"
default = ""
description = "Additional linker flags for go build"
env_var = "LDFLAGS"

# ============================================================================
# Docker Phase - Build and push container images
# ============================================================================

[presets.kaniko]
name = "kaniko"
phase = "docker"
image = "gcr.io/kaniko-project/executor:v1.24.0"
command = "--context=/workspace --dockerfile=Dockerfile --destination=${IMAGE_NAME}:${IMAGE_TAG} --cache=true"
workdir = "/workspace"
volumes = [
    "${WORKSPACE}:/workspace",
    "${HOME}/.docker:/kaniko/.docker:ro",
]
require_ci = false
local_behavior = "no-push"
privileged = true

[presets.kaniko.env]
IMAGE_NAME = "ghcr.io/${GITHUB_REPOSITORY}"
IMAGE_TAG = "latest"

[presets.kaniko.options.destination]
type = "string"
default = ""
description = "Full image destination (registry/image:tag)"
command_flag = "--destination"

[presets.kaniko.options.dockerfile]
type = "string"
default = "Dockerfile"
description = "Path to Dockerfile"
command_flag = "--dockerfile"

[presets.kaniko.options.cache]
type = "bool"
default = true
description = "Enable layer caching"
command_flag = "--cache"

[presets.docker-buildx]
name = "docker-buildx"
phase = "docker"
image = "docker:29.0.4"
command = "sh -c 'docker buildx build --platform linux/amd64,linux/arm64 -t ${IMAGE_NAME}:${IMAGE_TAG} --push .'"
workdir = "/workspace"
volumes = [
    "${WORKSPACE}:/workspace",
    "/var/run/docker.sock:/var/run/docker.sock",
]
require_ci = false
local_behavior = "no-push"

[presets.docker-buildx.env]
HOME = "/tmp"
IMAGE_NAME = "ghcr.io/${GITHUB_REPOSITORY}"
IMAGE_TAG = "latest"

# ============================================================================
# Release Phase - Create GitHub releases and publish artifacts
# ============================================================================

[presets.gh-release]
name = "gh-release"
phase = "release"
image = "maniator/gh:v2.83.1"
command = "release create ${TAG} ${ARTIFACTS} --generate-notes"
workdir = "/workspace"
volumes = ["${WORKSPACE}:/workspace"]
require_ci = false
local_behavior = "draft"

[presets.gh-release.env]
TAG = "${GIT_TAG}"
ARTIFACTS = "bin/cidx"
GH_TOKEN = "${GITHUB_TOKEN}"

[presets.gh-release.options.draft]
type = "bool"
default = false
description = "Create release as draft"
command_flag = "--draft"

[presets.gh-release.options.prerelease]
type = "bool"
default = false
description = "Mark as prerelease"
command_flag = "--prerelease"

[presets.goreleaser]
name = "goreleaser"
phase = "release"
image = "goreleaser/goreleaser:v2.12.7"
command = "goreleaser release --clean"
workdir = "/workspace"
volumes = [
    "${WORKSPACE}:/workspace",
    "/var/run/docker.sock:/var/run/docker.sock",
]
require_ci = false
local_behavior = "draft"

[presets.goreleaser.env]
GITHUB_TOKEN = "${GITHUB_TOKEN}"

[presets.goreleaser.options.snapshot]
type = "bool"
default = false
description = "Build snapshot (without publishing)"
command_flag = "--snapshot"

[presets.goreleaser.options.skip_publish]
type = "bool"
default = false
description = "Skip publishing"
command_flag = "--skip=publish"
