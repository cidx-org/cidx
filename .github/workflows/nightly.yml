name: CIDX Nightly

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  # Build: Compile nightly binary
  build:
    name: Build Nightly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Need full history for version

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate nightly version
        id: version
        run: |
          # Get latest tag or default to v0.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LATEST_TAG#v}

          # Generate nightly identifier: VERSION-nightly.YYYYMMDD.SHORT_SHA
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          NIGHTLY_VERSION="${VERSION}-nightly.${DATE}.${SHORT_SHA}"

          echo "version=${NIGHTLY_VERSION}" >> $GITHUB_OUTPUT
          echo "Generated nightly version: ${NIGHTLY_VERSION}"

      - name: Build nightly binary
        run: |
          go build -ldflags "-X main.Version=${{ steps.version.outputs.version }}" -o bin/cidx ./cmd/cidx

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: cidx-nightly
          path: bin/cidx
          retention-days: 7

  # Docker: Build and push nightly container image
  docker:
    name: Docker Nightly
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: cidx-nightly
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/cidx

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: ./bin/cidx run docker
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          IMAGE_TAG: nightly
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
