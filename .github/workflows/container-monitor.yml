name: Container Monitor

on:
  schedule:
    # Run weekly on Mondays at 9:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      skip_audit:
        description: "Skip security audit of current containers"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  # Job 1: Security audit of ALL current container images
  security-audit:
    name: Security Audit - All Containers
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_audit != 'true' }}
    outputs:
      vulnerable_count: ${{ steps.audit.outputs.vulnerable_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Audit all containers with Trivy and Grype
        id: audit
        run: |
          echo "## Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scanning ALL preset containers for vulnerabilities..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get all images from presets
          IMAGES=$(./bin/cidx preset check-updates --json | jq -r '.[].image')

          # Initialize counters
          echo "0" > /tmp/vulnerable_count
          echo "0" > /tmp/clean_count

          echo "| Container | Trivy | Grype | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|-------|--------|" >> $GITHUB_STEP_SUMMARY

          for IMAGE in $IMAGES; do
            NAME=$(echo "$IMAGE" | cut -d: -f1 | rev | cut -d/ -f1 | rev)
            echo ""
            echo "đź”Ť Scanning: $IMAGE"

            TRIVY_STATUS="âś…"
            GRYPE_STATUS="âś…"
            OVERALL_STATUS="âś… Clean"
            HAS_VULN=false

            # Trivy scan
            echo "   Running Trivy..."
            if ! docker run --rm aquasec/trivy:latest image \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --quiet \
              "$IMAGE" 2>&1; then
              TRIVY_STATUS="âťŚ HIGH/CRIT"
              HAS_VULN=true
            fi

            # Grype scan
            echo "   Running Grype..."
            if ! docker run --rm anchore/grype:latest \
              "$IMAGE" \
              --fail-on high \
              --quiet 2>&1; then
              GRYPE_STATUS="âťŚ HIGH/CRIT"
              HAS_VULN=true
            fi

            if [ "$HAS_VULN" = true ]; then
              OVERALL_STATUS="âš ď¸Ź Vulnerable"
              echo $(($(cat /tmp/vulnerable_count) + 1)) > /tmp/vulnerable_count
            else
              echo $(($(cat /tmp/clean_count) + 1)) > /tmp/clean_count
            fi

            echo "| \`$NAME\` | $TRIVY_STATUS | $GRYPE_STATUS | $OVERALL_STATUS |" >> $GITHUB_STEP_SUMMARY
          done

          VULNERABLE=$(cat /tmp/vulnerable_count)
          CLEAN=$(cat /tmp/clean_count)

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "- âś… Clean: **$CLEAN**" >> $GITHUB_STEP_SUMMARY
          echo "- âš ď¸Ź Vulnerable: **$VULNERABLE**" >> $GITHUB_STEP_SUMMARY

          echo "vulnerable_count=$VULNERABLE" >> $GITHUB_OUTPUT

          if [ "$VULNERABLE" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "âš ď¸Ź **Some containers have known vulnerabilities. Consider updating or finding alternatives.**" >> $GITHUB_STEP_SUMMARY
          fi

  # Job 2: Check for updates and promote safe ones
  promote-containers:
    name: Promote Container Updates
    runs-on: ubuntu-latest
    needs: [security-audit]
    if: always() && (needs.security-audit.result == 'success' || needs.security-audit.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Check for updates and validate
        id: promote
        run: |
          echo "## Container Promotion Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get updates as JSON
          UPDATES_JSON=$(./bin/cidx preset check-updates --json)
          echo "Updates found:"
          echo "$UPDATES_JSON" | jq .

          # Initialize counters (use files to persist across subshell)
          echo "0" > /tmp/promoted_count
          echo "0" > /tmp/failed_count
          echo "0" > /tmp/skipped_count
          echo "" > /tmp/failed_containers

          # Process each image with available update
          echo "$UPDATES_JSON" | jq -c '.[]' | while read -r item; do
            NAME=$(echo "$item" | jq -r '.name')
            CURRENT=$(echo "$item" | jq -r '.current')
            LATEST=$(echo "$item" | jq -r '.latest')
            IMAGE=$(echo "$item" | jq -r '.image')
            IMAGE_BASE=$(echo "$item" | jq -r '.image_base')
            HAS_UPDATE=$(echo "$item" | jq -r '.has_update')

            if [ "$HAS_UPDATE" != "true" ]; then
              echo "âŹ­ď¸Ź $NAME: Already up to date ($CURRENT)"
              echo $(($(cat /tmp/skipped_count) + 1)) > /tmp/skipped_count
              continue
            fi

            # Build new image reference
            NEW_IMAGE="$IMAGE_BASE:$LATEST"

            echo ""
            echo "đź”Ť Validating: $NAME"
            echo "   Current: $IMAGE"
            echo "   New:     $NEW_IMAGE"

            SCAN_FAILED=false

            # Run Trivy security scan on NEW version
            echo "   Running Trivy scan..."
            if ! docker run --rm aquasec/trivy:latest image \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --quiet \
              "$NEW_IMAGE" 2>&1; then
              echo "   âťŚ Trivy: HIGH/CRITICAL vulnerabilities found"
              SCAN_FAILED=true
            else
              echo "   âś… Trivy: Clean"
            fi

            # Run Grype security scan on NEW version
            echo "   Running Grype scan..."
            if ! docker run --rm anchore/grype:latest \
              "$NEW_IMAGE" \
              --fail-on high \
              --quiet 2>&1; then
              echo "   âťŚ Grype: HIGH/CRITICAL vulnerabilities found"
              SCAN_FAILED=true
            else
              echo "   âś… Grype: Clean"
            fi

            if [ "$SCAN_FAILED" = true ]; then
              echo "   âťŚ FAILED: Security vulnerabilities found in $NEW_IMAGE"
              echo "- âťŚ **$NAME**: $CURRENT â†’ $LATEST - **SECURITY VULNERABILITIES DETECTED**" >> $GITHUB_STEP_SUMMARY
              echo $(($(cat /tmp/failed_count) + 1)) > /tmp/failed_count
              echo "$NAME ($NEW_IMAGE)" >> /tmp/failed_containers
              continue
            fi

            echo "   âś… All security scans passed"

            # Update presets.toml with new tag
            echo "   Updating presets.toml..."
            sed -i "s|image = \"$IMAGE\"|image = \"$NEW_IMAGE\"|g" pkg/presets/presets.toml

            echo "- âś… **$NAME**: $CURRENT â†’ $LATEST - Promoted (Trivy âś… Grype âś…)" >> $GITHUB_STEP_SUMMARY
            echo $(($(cat /tmp/promoted_count) + 1)) > /tmp/promoted_count
          done

          # Read final counts
          PROMOTED=$(cat /tmp/promoted_count)
          FAILED=$(cat /tmp/failed_count)
          SKIPPED=$(cat /tmp/skipped_count)
          FAILED_LIST=$(cat /tmp/failed_containers)

          echo ""
          echo "=========================================="
          echo "SUMMARY: Promoted=$PROMOTED, Failed=$FAILED, Skipped=$SKIPPED"
          echo "=========================================="

          # Output for next steps
          echo "promoted_count=$PROMOTED" >> $GITHUB_OUTPUT
          echo "failed_count=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped_count=$SKIPPED" >> $GITHUB_OUTPUT

          # Add summary
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "- âś… Promoted: **$PROMOTED**" >> $GITHUB_STEP_SUMMARY
          echo "- âťŚ Security failures: **$FAILED**" >> $GITHUB_STEP_SUMMARY
          echo "- âŹ­ď¸Ź Already up to date: **$SKIPPED**" >> $GITHUB_STEP_SUMMARY

          # Determine if we have changes to promote
          if git diff --quiet pkg/presets/presets.toml; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo ""
            echo "Changes made to presets.toml:"
            git diff pkg/presets/presets.toml
          fi

          # If there were security failures, save the list for the final step
          if [ "$FAILED" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Security Alert" >> $GITHUB_STEP_SUMMARY
            echo "The following containers have security vulnerabilities in their latest versions:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$FAILED_LIST" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "These containers were **NOT** promoted. Manual review required." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Rebuild and test CIDX
        if: steps.promote.outputs.has_changes == 'true'
        run: |
          echo "## Build Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Rebuild with updated presets
          go build -o bin/cidx ./cmd/cidx

          # Run unit tests only (exclude BDD/integration tests)
          go test ./pkg/... ./cmd/...

          # Verify presets still load correctly
          ./bin/cidx preset list > /dev/null

          echo "âś… **Build and tests passed**" >> $GITHUB_STEP_SUMMARY

      - name: Bump version with commitizen
        if: steps.promote.outputs.has_changes == 'true'
        id: bump
        run: |
          echo "## Version Bump" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Install commitizen
          pip install commitizen

          # Get current version
          CURRENT_VERSION=$(cz version --project 2>/dev/null || echo "0.0.0")
          echo "Current version: $CURRENT_VERSION"

          # Bump patch version (container updates are patches)
          cz bump --yes --increment PATCH --changelog 2>&1 || true

          # Get new version
          NEW_VERSION=$(cz version --project 2>/dev/null || echo "unknown")
          echo "New version: $NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "âś… **Version bumped: $CURRENT_VERSION â†’ $NEW_VERSION**" >> $GITHUB_STEP_SUMMARY

      - name: Create Pull Request
        if: steps.promote.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): promote container versions to ${{ steps.bump.outputs.new_version }}"
          title: "chore(deps): promote container versions -> ${{ steps.bump.outputs.new_version }}"
          body: |
            ## Container Version Promotion

            This PR updates container image tags in `pkg/presets/presets.toml` after security validation.

            **New CIDX Version: `${{ steps.bump.outputs.new_version }}`**

            ### Validation Process
            1. Checked for available updates
            2. Ran **Trivy** security scan on each new version
            3. Ran **Grype** security scan on each new version
            4. Only promoted images that passed HIGH/CRITICAL vulnerability check on BOTH scanners
            5. Rebuilt CIDX and ran tests
            6. Bumped version with commitizen

            See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for detailed scan results.

            Generated automatically by Container Monitor workflow
          branch: chore/promote-containers
          delete-branch: true

      - name: Report security failures
        if: always() && steps.promote.outputs.failed_count != '0' && steps.promote.outputs.failed_count != ''
        run: |
          echo ""
          echo "=============================================="
          echo "SECURITY ALERT: ${{ steps.promote.outputs.failed_count }} container(s) have vulnerabilities!"
          echo "=============================================="
          echo ""
          echo "Check the workflow summary for details."
          echo "These containers need manual review before updating."
          exit 1
