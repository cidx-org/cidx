name: Container Monitor

on:
  schedule:
    # Run weekly on Mondays at 9:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      skip_audit:
        description: "Skip security audit of current containers"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  # Job 1: Get unique images from presets (deduplication)
  get-images:
    name: Get Unique Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.images.outputs.images }}
      count: ${{ steps.images.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Extract unique images
        id: images
        run: |
          # Get unique images as JSON array
          IMAGES_JSON=$(./bin/cidx preset images --json | jq -c '[.[].image]')
          COUNT=$(echo "$IMAGES_JSON" | jq 'length')

          echo "images=$IMAGES_JSON" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          echo "Found $COUNT unique container images:"
          echo "$IMAGES_JSON" | jq -r '.[]'

  # Job 2: Security audit with Trivy (parallel matrix)
  trivy-scan:
    name: Trivy Scan
    needs: get-images
    if: ${{ github.event.inputs.skip_audit != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.get-images.outputs.images) }}

    steps:
      - name: Run Trivy scan
        id: trivy
        run: |
          IMAGE="${{ matrix.image }}"
          echo "Scanning: $IMAGE"

          # Run Trivy
          if docker run --rm aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --quiet \
            "$IMAGE" 2>&1; then
            echo "status=clean" >> $GITHUB_OUTPUT
            echo "result=clean" >> $GITHUB_OUTPUT
          else
            echo "status=vulnerable" >> $GITHUB_OUTPUT
            echo "result=HIGH/CRITICAL vulnerabilities found" >> $GITHUB_OUTPUT
          fi

      - name: Report result
        run: |
          if [ "${{ steps.trivy.outputs.status }}" = "clean" ]; then
            echo "Trivy: ${{ matrix.image }} is clean"
          else
            echo "Trivy: ${{ matrix.image }} has vulnerabilities"
          fi

  # Job 3: Security audit with Grype (parallel matrix)
  grype-scan:
    name: Grype Scan
    needs: get-images
    if: ${{ github.event.inputs.skip_audit != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.get-images.outputs.images) }}

    steps:
      - name: Run Grype scan
        id: grype
        run: |
          IMAGE="${{ matrix.image }}"
          echo "Scanning: $IMAGE"

          # Run Grype
          if docker run --rm anchore/grype:latest \
            "$IMAGE" \
            --fail-on high \
            --quiet 2>&1; then
            echo "status=clean" >> $GITHUB_OUTPUT
            echo "result=clean" >> $GITHUB_OUTPUT
          else
            echo "status=vulnerable" >> $GITHUB_OUTPUT
            echo "result=HIGH/CRITICAL vulnerabilities found" >> $GITHUB_OUTPUT
          fi

      - name: Report result
        run: |
          if [ "${{ steps.grype.outputs.status }}" = "clean" ]; then
            echo "Grype: ${{ matrix.image }} is clean"
          else
            echo "Grype: ${{ matrix.image }} has vulnerabilities"
          fi

  # Job 4: Generate audit summary
  audit-summary:
    name: Audit Summary
    needs: [get-images, trivy-scan, grype-scan]
    if: always() && github.event.inputs.skip_audit != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Generate summary
        run: |
          echo "## Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scanned **${{ needs.get-images.outputs.count }}** unique container images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy-scan.result == 'success' && 'All clean' || 'Some failures' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Grype | ${{ needs.grype-scan.result == 'success' && 'All clean' || 'Some failures' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View individual job logs for detailed scan results." >> $GITHUB_STEP_SUMMARY

  # Job 5: Check for updates and promote safe ones
  promote-containers:
    name: Promote Container Updates
    runs-on: ubuntu-latest
    needs: [audit-summary]
    if: always() && (needs.audit-summary.result == 'success' || needs.audit-summary.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Check for updates and validate
        id: promote
        run: |
          echo "## Container Promotion Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get updates as JSON
          UPDATES_JSON=$(./bin/cidx preset check-updates --json)
          echo "Updates found:"
          echo "$UPDATES_JSON" | jq .

          # Initialize counters (use files to persist across subshell)
          echo "0" > /tmp/promoted_count
          echo "0" > /tmp/failed_count
          echo "0" > /tmp/skipped_count
          echo "" > /tmp/failed_containers

          # Process each image with available update
          echo "$UPDATES_JSON" | jq -c '.[]' | while read -r item; do
            NAME=$(echo "$item" | jq -r '.name')
            CURRENT=$(echo "$item" | jq -r '.current')
            LATEST=$(echo "$item" | jq -r '.latest')
            IMAGE=$(echo "$item" | jq -r '.image')
            IMAGE_BASE=$(echo "$item" | jq -r '.image_base')
            HAS_UPDATE=$(echo "$item" | jq -r '.has_update')

            if [ "$HAS_UPDATE" != "true" ]; then
              echo "$NAME: Already up to date ($CURRENT)"
              echo $(($(cat /tmp/skipped_count) + 1)) > /tmp/skipped_count
              continue
            fi

            # Build new image reference
            NEW_IMAGE="$IMAGE_BASE:$LATEST"

            echo ""
            echo "Validating: $NAME"
            echo "   Current: $IMAGE"
            echo "   New:     $NEW_IMAGE"

            SCAN_FAILED=false

            # Run Trivy security scan on NEW version
            echo "   Running Trivy scan..."
            if ! docker run --rm aquasec/trivy:latest image \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --quiet \
              "$NEW_IMAGE" 2>&1; then
              echo "   Trivy: HIGH/CRITICAL vulnerabilities found"
              SCAN_FAILED=true
            else
              echo "   Trivy: Clean"
            fi

            # Run Grype security scan on NEW version
            echo "   Running Grype scan..."
            if ! docker run --rm anchore/grype:latest \
              "$NEW_IMAGE" \
              --fail-on high \
              --quiet 2>&1; then
              echo "   Grype: HIGH/CRITICAL vulnerabilities found"
              SCAN_FAILED=true
            else
              echo "   Grype: Clean"
            fi

            if [ "$SCAN_FAILED" = true ]; then
              echo "   FAILED: Security vulnerabilities found in $NEW_IMAGE"
              echo "- **$NAME**: $CURRENT -> $LATEST - **SECURITY VULNERABILITIES DETECTED**" >> $GITHUB_STEP_SUMMARY
              echo $(($(cat /tmp/failed_count) + 1)) > /tmp/failed_count
              echo "$NAME ($NEW_IMAGE)" >> /tmp/failed_containers
              continue
            fi

            echo "   All security scans passed"

            # Update presets.toml with new tag
            echo "   Updating presets.toml..."
            sed -i "s|image = \"$IMAGE\"|image = \"$NEW_IMAGE\"|g" pkg/presets/presets.toml

            echo "- **$NAME**: $CURRENT -> $LATEST - Promoted (Trivy + Grype clean)" >> $GITHUB_STEP_SUMMARY
            echo $(($(cat /tmp/promoted_count) + 1)) > /tmp/promoted_count
          done

          # Read final counts
          PROMOTED=$(cat /tmp/promoted_count)
          FAILED=$(cat /tmp/failed_count)
          SKIPPED=$(cat /tmp/skipped_count)
          FAILED_LIST=$(cat /tmp/failed_containers)

          echo ""
          echo "=========================================="
          echo "SUMMARY: Promoted=$PROMOTED, Failed=$FAILED, Skipped=$SKIPPED"
          echo "=========================================="

          # Output for next steps
          echo "promoted_count=$PROMOTED" >> $GITHUB_OUTPUT
          echo "failed_count=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped_count=$SKIPPED" >> $GITHUB_OUTPUT

          # Add summary
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Promoted: **$PROMOTED**" >> $GITHUB_STEP_SUMMARY
          echo "- Security failures: **$FAILED**" >> $GITHUB_STEP_SUMMARY
          echo "- Already up to date: **$SKIPPED**" >> $GITHUB_STEP_SUMMARY

          # Determine if we have changes to promote
          if git diff --quiet pkg/presets/presets.toml; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo ""
            echo "Changes made to presets.toml:"
            git diff pkg/presets/presets.toml
          fi

          # If there were security failures, save the list for the final step
          if [ "$FAILED" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Security Alert" >> $GITHUB_STEP_SUMMARY
            echo "The following containers have security vulnerabilities in their latest versions:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$FAILED_LIST" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "These containers were **NOT** promoted. Manual review required." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Rebuild and test CIDX
        if: steps.promote.outputs.has_changes == 'true'
        run: |
          echo "## Build Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Rebuild with updated presets
          go build -o bin/cidx ./cmd/cidx

          # Run unit tests only (exclude BDD/integration tests)
          go test ./pkg/... ./cmd/...

          # Verify presets still load correctly
          ./bin/cidx preset list > /dev/null

          echo "**Build and tests passed**" >> $GITHUB_STEP_SUMMARY

      - name: Bump version with commitizen
        if: steps.promote.outputs.has_changes == 'true'
        id: bump
        run: |
          echo "## Version Bump" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Install commitizen
          pip install commitizen

          # Get current version
          CURRENT_VERSION=$(cz version --project 2>/dev/null || echo "0.0.0")
          echo "Current version: $CURRENT_VERSION"

          # Bump patch version (container updates are patches)
          cz bump --yes --increment PATCH --changelog 2>&1 || true

          # Get new version
          NEW_VERSION=$(cz version --project 2>/dev/null || echo "unknown")
          echo "New version: $NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "**Version bumped: $CURRENT_VERSION -> $NEW_VERSION**" >> $GITHUB_STEP_SUMMARY

      - name: Create Pull Request
        if: steps.promote.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): promote container versions to ${{ steps.bump.outputs.new_version }}"
          title: "chore(deps): promote container versions -> ${{ steps.bump.outputs.new_version }}"
          body: |
            ## Container Version Promotion

            This PR updates container image tags in `pkg/presets/presets.toml` after security validation.

            **New CIDX Version: `${{ steps.bump.outputs.new_version }}`**

            ### Validation Process
            1. Checked for available updates
            2. Ran **Trivy** security scan on each new version
            3. Ran **Grype** security scan on each new version
            4. Only promoted images that passed HIGH/CRITICAL vulnerability check on BOTH scanners
            5. Rebuilt CIDX and ran tests
            6. Bumped version with commitizen

            See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for detailed scan results.

            Generated automatically by Container Monitor workflow
          branch: chore/promote-containers
          delete-branch: true

      - name: Report security failures
        if: always() && steps.promote.outputs.failed_count != '0' && steps.promote.outputs.failed_count != ''
        run: |
          echo ""
          echo "=============================================="
          echo "SECURITY ALERT: ${{ steps.promote.outputs.failed_count }} container(s) have vulnerabilities!"
          echo "=============================================="
          echo ""
          echo "Check the workflow summary for details."
          echo "These containers need manual review before updating."
          exit 1
