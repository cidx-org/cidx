name: Container Monitor

on:
  schedule:
    # Run weekly on Mondays at 9:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Job 1: Get deduplicated scan targets (new version if available, else current)
  get-scan-targets:
    name: Get Scan Targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
      scan_images: ${{ steps.targets.outputs.scan_images }}
      count: ${{ steps.targets.outputs.count }}
      has_updates: ${{ steps.targets.outputs.has_updates }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Get scan targets
        id: targets
        run: |
          # Get deduplicated scan targets with update detection
          TARGETS_JSON=$(./bin/cidx preset scan-targets)

          # Extract just the scan_image array for matrix
          SCAN_IMAGES=$(echo "$TARGETS_JSON" | jq -c '[.[].scan_image]')
          COUNT=$(echo "$SCAN_IMAGES" | jq 'length')
          HAS_UPDATES=$(echo "$TARGETS_JSON" | jq 'any(.is_update == true)')

          # Save full targets for promote job
          echo "targets<<EOF" >> $GITHUB_OUTPUT
          echo "$TARGETS_JSON" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "scan_images=$SCAN_IMAGES" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "has_updates=$HAS_UPDATES" >> $GITHUB_OUTPUT

          echo "## Scan Targets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Found **$COUNT** unique images to scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Show updates
          UPDATES=$(echo "$TARGETS_JSON" | jq -r '.[] | select(.is_update == true) | "- \(.current_image) → \(.scan_image)"')
          if [ -n "$UPDATES" ]; then
            echo "### Updates Available" >> $GITHUB_STEP_SUMMARY
            echo "$UPDATES" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Show current (no updates)
          CURRENT=$(echo "$TARGETS_JSON" | jq -r '.[] | select(.is_update == false) | "- \(.scan_image)"')
          if [ -n "$CURRENT" ]; then
            echo "### Current (no updates)" >> $GITHUB_STEP_SUMMARY
            echo "$CURRENT" >> $GITHUB_STEP_SUMMARY
          fi

  # Job 2: Trivy scan (parallel matrix)
  trivy-scan:
    name: Trivy
    needs: get-scan-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.get-scan-targets.outputs.scan_images) }}

    steps:
      - name: Login to Docker Hardened Images
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Scan with Trivy
        id: scan
        run: |
          IMAGE="${{ matrix.image }}"
          echo "Scanning: $IMAGE"

          if docker run --rm aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --quiet \
            "$IMAGE" 2>&1; then
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            echo "status=vulnerable" >> $GITHUB_OUTPUT
          fi

      - name: Report
        run: |
          echo "Trivy ${{ matrix.image }}: ${{ steps.scan.outputs.status }}"

  # Job 3: Grype scan (parallel matrix)
  grype-scan:
    name: Grype
    needs: get-scan-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.get-scan-targets.outputs.scan_images) }}

    steps:
      - name: Login to Docker Hardened Images
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Scan with Grype
        id: scan
        run: |
          IMAGE="${{ matrix.image }}"
          echo "Scanning: $IMAGE"

          if docker run --rm anchore/grype:latest \
            "$IMAGE" \
            --fail-on high \
            --quiet 2>&1; then
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            echo "status=vulnerable" >> $GITHUB_OUTPUT
          fi

      - name: Report
        run: |
          echo "Grype ${{ matrix.image }}: ${{ steps.scan.outputs.status }}"

  # Job 4: Promote updates that passed scans
  promote:
    name: Promote Updates
    needs: [get-scan-targets, trivy-scan, grype-scan]
    if: needs.get-scan-targets.outputs.has_updates == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Check scan results and promote
        id: promote
        env:
          TRIVY_RESULT: ${{ needs.trivy-scan.result }}
          GRYPE_RESULT: ${{ needs.grype-scan.result }}
          TARGETS_JSON: ${{ needs.get-scan-targets.outputs.targets }}
        run: |
          echo "## Promotion Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "Trivy overall: $TRIVY_RESULT"
          echo "Grype overall: $GRYPE_RESULT"

          # Only promote if both scanners passed
          if [ "$TRIVY_RESULT" != "success" ] || [ "$GRYPE_RESULT" != "success" ]; then
            echo "Some scans failed - promoting only images that passed"
            echo "**Warning**: Some security scans failed. Only safe images will be promoted." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          PROMOTED=0
          SKIPPED=0

          # Process each target with is_update=true
          echo "$TARGETS_JSON" | jq -c '.[] | select(.is_update == true)' | while read -r target; do
            CURRENT=$(echo "$target" | jq -r '.current_image')
            NEW=$(echo "$target" | jq -r '.scan_image')
            PRESETS=$(echo "$target" | jq -r '.presets | join(", ")')

            echo "Promoting: $CURRENT → $NEW (used by: $PRESETS)"

            # Update presets.toml
            sed -i "s|image = \"$CURRENT\"|image = \"$NEW\"|g" pkg/presets/presets.toml

            echo "- **$CURRENT** → **$NEW** (presets: $PRESETS)" >> $GITHUB_STEP_SUMMARY
            echo $(($(cat /tmp/promoted_count 2>/dev/null || echo 0) + 1)) > /tmp/promoted_count
          done

          PROMOTED=$(cat /tmp/promoted_count 2>/dev/null || echo 0)

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total promoted: $PROMOTED**" >> $GITHUB_STEP_SUMMARY

          # Check for changes
          if git diff --quiet pkg/presets/presets.toml; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo ""
            echo "Changes:"
            git diff pkg/presets/presets.toml
          fi

      - name: Test build
        if: steps.promote.outputs.has_changes == 'true'
        run: |
          go build -o bin/cidx ./cmd/cidx
          go test ./pkg/... ./cmd/...
          ./bin/cidx preset list > /dev/null
          echo "Build and tests passed" >> $GITHUB_STEP_SUMMARY

      - name: Bump version
        if: steps.promote.outputs.has_changes == 'true'
        id: bump
        run: |
          pip install commitizen
          CURRENT=$(cz version --project 2>/dev/null || echo "0.0.0")
          cz bump --yes --increment PATCH --changelog 2>&1 || true
          NEW=$(cz version --project 2>/dev/null || echo "unknown")
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          echo "**Version: $CURRENT → $NEW**" >> $GITHUB_STEP_SUMMARY

      - name: Create Pull Request
        if: steps.promote.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update container images to ${{ steps.bump.outputs.new_version }}"
          title: "chore(deps): update container images → ${{ steps.bump.outputs.new_version }}"
          body: |
            ## Container Image Updates

            This PR updates container images in `pkg/presets/presets.toml`.

            **Version: `${{ steps.bump.outputs.new_version }}`**

            ### Security Validation
            - Trivy: ${{ needs.trivy-scan.result }}
            - Grype: ${{ needs.grype-scan.result }}

            All updated images passed HIGH/CRITICAL vulnerability checks.

            See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            Generated by Container Monitor
          branch: chore/update-containers
          delete-branch: true

  # Job 5: Summary (runs even if no updates)
  summary:
    name: Summary
    needs: [get-scan-targets, trivy-scan, grype-scan, promote]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate summary
        run: |
          echo "## Container Monitor Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Targets | ${{ needs.get-scan-targets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Scans | ${{ needs.trivy-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Grype Scans | ${{ needs.grype-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Promotion | ${{ needs.promote.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images scanned: **${{ needs.get-scan-targets.outputs.count }}**" >> $GITHUB_STEP_SUMMARY
          echo "Updates available: **${{ needs.get-scan-targets.outputs.has_updates }}**" >> $GITHUB_STEP_SUMMARY
