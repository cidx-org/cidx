name: Container Monitor

on:
  schedule:
    # Run weekly on Mondays at 9:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      create_pr:
        description: "Create PR if updates found"
        required: false
        default: "false"
        type: boolean

jobs:
  check-updates:
    name: Check Container Updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Check for updates
        id: check
        run: |
          echo "## Container Image Update Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ./bin/cidx preset check-updates 2>&1 | tee updates.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Count updates
          UPDATES=$(grep -c "Update available" updates.txt || echo "0")
          echo "updates_count=$UPDATES" >> $GITHUB_OUTPUT

          if [ "$UPDATES" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **$UPDATES update(s) available**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All containers are up to date" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check JSON output
        run: |
          echo "## JSON Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          ./bin/cidx preset check-updates --json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  scan-images:
    name: Security Scan Images
    runs-on: ubuntu-latest
    needs: check-updates

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Run Trivy on preset images
        run: |
          echo "## Image Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get list of images from presets
          ./bin/cidx preset export | grep "^image = " | sed 's/image = "\(.*\)"/\1/' | sort -u > images.txt

          echo "Scanning $(wc -l < images.txt) unique images..."
          echo "" >> $GITHUB_STEP_SUMMARY

          VULN_COUNT=0
          while IFS= read -r image; do
            echo "Scanning: $image"

            # Run trivy and count HIGH/CRITICAL vulnerabilities
            RESULT=$(docker run --rm aquasec/trivy:latest image --severity HIGH,CRITICAL --quiet "$image" 2>/dev/null | grep -c "HIGH\|CRITICAL" || echo "0")

            if [ "$RESULT" -gt 0 ]; then
              echo "- ⚠️ **$image**: $RESULT HIGH/CRITICAL vulnerabilities" >> $GITHUB_STEP_SUMMARY
              VULN_COUNT=$((VULN_COUNT + RESULT))
            else
              echo "- ✅ **$image**: Clean" >> $GITHUB_STEP_SUMMARY
            fi
          done < images.txt

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "⚠️ **Total: $VULN_COUNT HIGH/CRITICAL vulnerabilities found**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **All images passed security scan**" >> $GITHUB_STEP_SUMMARY
          fi
