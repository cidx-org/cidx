name: CIDX Release

on:
  push:
    tags: ["v*"]

jobs:
  # Build: Compile release binary with version
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build release binary
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -ldflags "-X main.Version=$VERSION" -o bin/cidx ./cmd/cidx

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cidx-binary
          path: bin/cidx
          retention-days: 7

  # Docker: Build and push container image
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: cidx-binary
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/cidx

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: ./bin/cidx run docker
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Release: Create GitHub Release with artifacts
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: cidx-binary
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/cidx

      - name: Configure gh CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Create GitHub Release
        run: ./bin/cidx run github-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_TAG: ${{ github.ref_name }}
