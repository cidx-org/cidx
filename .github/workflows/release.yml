name: CIDX Release

on:
  push:
    tags: ["v*"]

jobs:
  # Build: Cross-compile for all platforms
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build release binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X main.Version=$VERSION"
          mkdir -p dist

          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/cidx-linux-amd64 ./cmd/cidx
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/cidx-linux-arm64 ./cmd/cidx

          # macOS
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/cidx-darwin-amd64 ./cmd/cidx
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/cidx-darwin-arm64 ./cmd/cidx

          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/cidx-windows-amd64.exe ./cmd/cidx

          # Default binary for backward compat
          cp dist/cidx-linux-amd64 dist/cidx

          # Checksums
          cd dist && sha256sum cidx-* > checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cidx-binaries
          path: dist/
          retention-days: 7

  # Docker: Build and push container image
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: cidx-binaries
          path: dist/

      - name: Prepare binary
        run: |
          mkdir -p bin
          cp dist/cidx-linux-amd64 bin/cidx
          chmod +x bin/cidx

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: ./bin/cidx run docker
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Release: Create GitHub Release with all binaries
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: cidx-binaries
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/cidx-linux-amd64
            dist/cidx-linux-arm64
            dist/cidx-darwin-amd64
            dist/cidx-darwin-arm64
            dist/cidx-windows-amd64.exe
            dist/checksums.txt
