name: CIDX CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Run CIDX CI Pipeline
        run: ./bin/cidx run ci

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: cidx-binary
          path: bin/cidx
          retention-days: 7
