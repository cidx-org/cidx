name: CIDX CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # Setup: Build CIDX for use in subsequent jobs
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Upload CIDX binary
        uses: actions/upload-artifact@v4
        with:
          name: cidx
          path: bin/cidx
          retention-days: 1

  # Security: Scan for vulnerabilities and secrets
  security:
    name: Security
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for gitleaks

      - name: Download CIDX
        uses: actions/download-artifact@v4
        with:
          name: cidx
          path: bin/

      - name: Make CIDX executable
        run: chmod +x bin/cidx

      - name: Run security checks
        run: ./bin/cidx run security

  # Code Quality: Linting and formatting
  code:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commitizen

      - name: Download CIDX
        uses: actions/download-artifact@v4
        with:
          name: cidx
          path: bin/

      - name: Make CIDX executable
        run: chmod +x bin/cidx

      - name: Run code quality checks
        run: ./bin/cidx run code

  # Test: Run unit and integration tests
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [security, code]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download CIDX
        uses: actions/download-artifact@v4
        with:
          name: cidx
          path: bin/

      - name: Make CIDX executable
        run: chmod +x bin/cidx

      - name: Run tests
        run: ./bin/cidx run test

  # Build: Compile final binary
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download CIDX
        uses: actions/download-artifact@v4
        with:
          name: cidx
          path: bin/

      - name: Make CIDX executable
        run: chmod +x bin/cidx

      - name: Build final binary
        run: ./bin/cidx run build

      - name: Upload final binary
        uses: actions/upload-artifact@v4
        with:
          name: cidx-binary
          path: bin/cidx
          retention-days: 7

  # Docker: Build and push container (managed by CIDX)
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download CIDX
        uses: actions/download-artifact@v4
        with:
          name: cidx
          path: bin/

      - name: Make CIDX executable
        run: chmod +x bin/cidx

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: ./bin/cidx run docker
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Release: Create GitHub Release (managed by CIDX)
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download CIDX
        uses: actions/download-artifact@v4
        with:
          name: cidx
          path: bin/

      - name: Download final binary
        uses: actions/download-artifact@v4
        with:
          name: cidx-binary
          path: bin/

      - name: Make CIDX executable
        run: chmod +x bin/cidx

      - name: Create GitHub Release
        run: ./bin/cidx run release
        env:
          GIT_TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
