name: CIDX CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Security: Scan for vulnerabilities and secrets
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for gitleaks

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      # Login to DHI (Docker Hardened Images) for hardened container images
      - name: Login to Docker Hardened Images
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Run security checks
        run: ./bin/cidx run security

  # Code Quality: Linting and formatting
  code:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for commitizen

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Login to Docker Hardened Images
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Run code quality checks
        run: ./bin/cidx run code

  # Test: Run unit and integration tests
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [security, code]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Login to Docker Hardened Images
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Run tests
        run: ./bin/cidx run test

  # Build: Compile final binary (only on main branch)
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Login to Docker Hardened Images
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Build final binary
        run: ./bin/cidx run build
