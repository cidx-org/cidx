name: CIDX CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Bootstrap: Build CIDX binary once, share across all jobs
  bootstrap:
    name: Bootstrap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Upload CIDX binary
        uses: actions/upload-artifact@v4
        with:
          name: cidx-binary
          path: bin/cidx
          retention-days: 1

  # Security: Scan for vulnerabilities and secrets
  security:
    name: Security
    runs-on: ubuntu-latest
    needs: [bootstrap]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for gitleaks

      - name: Download CIDX binary
        uses: actions/download-artifact@v4
        with:
          name: cidx-binary
          path: bin

      - name: Make binary executable
        run: chmod +x bin/cidx

      - name: Login to Docker Hardened Images
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Run security checks
        run: ./bin/cidx run security

  # Code Quality: Linting and formatting
  code:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [bootstrap]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for commitizen

      - name: Download CIDX binary
        uses: actions/download-artifact@v4
        with:
          name: cidx-binary
          path: bin

      - name: Make binary executable
        run: chmod +x bin/cidx

      - name: Login to Docker Hardened Images
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Run code quality checks
        run: ./bin/cidx run code

  # Test: Run unit and integration tests
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [bootstrap]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download CIDX binary
        uses: actions/download-artifact@v4
        with:
          name: cidx-binary
          path: bin

      - name: Make binary executable
        run: chmod +x bin/cidx

      - name: Login to Docker Hardened Images
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Run tests
        run: ./bin/cidx run test

  # Build: Compile final binary (only on main branch)
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [security, code, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download CIDX binary
        uses: actions/download-artifact@v4
        with:
          name: cidx-binary
          path: bin

      - name: Make binary executable
        run: chmod +x bin/cidx

      - name: Login to Docker Hardened Images
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Build final binary
        run: ./bin/cidx run build
