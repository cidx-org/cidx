name: Security Audit

on:
  schedule:
    # Run daily at 6:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  # Job 1: Get unique images (current versions only)
  get-images:
    name: Get Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.images.outputs.images }}
      count: ${{ steps.images.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Get unique images
        id: images
        run: |
          IMAGES=$(./bin/cidx preset images --json | jq -c '[.[].image]')
          COUNT=$(echo "$IMAGES" | jq 'length')

          echo "images=$IMAGES" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          echo "## Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "Scanning **$COUNT** unique container images" >> $GITHUB_STEP_SUMMARY

  # Job 2: Trivy scan (parallel) with vulnerability exceptions
  trivy-scan:
    name: Trivy
    needs: get-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.get-images.outputs.images) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Generate ignore file
        run: |
          IMAGE="${{ matrix.image }}"
          ./bin/cidx vuln ignore --format trivy -o .trivyignore "$IMAGE"
          echo "Generated .trivyignore for $IMAGE:"
          cat .trivyignore

      - name: Scan
        id: scan
        run: |
          IMAGE="${{ matrix.image }}"
          if docker run --rm \
            -v "$(pwd)/.trivyignore:/root/.trivyignore:ro" \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --ignorefile /root/.trivyignore \
            --exit-code 1 \
            --quiet \
            "$IMAGE" 2>&1; then
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            echo "status=vulnerable" >> $GITHUB_OUTPUT
          fi

  # Job 3: Grype scan (parallel) with vulnerability exceptions
  grype-scan:
    name: Grype
    needs: get-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.get-images.outputs.images) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Generate ignore file
        run: |
          IMAGE="${{ matrix.image }}"
          ./bin/cidx vuln ignore --format grype -o .grype.yaml "$IMAGE"
          echo "Generated .grype.yaml for $IMAGE:"
          cat .grype.yaml

      - name: Scan
        id: scan
        run: |
          IMAGE="${{ matrix.image }}"
          if docker run --rm \
            -v "$(pwd)/.grype.yaml:/.grype.yaml:ro" \
            anchore/grype:latest \
            "$IMAGE" \
            --config /.grype.yaml \
            --fail-on high \
            --quiet 2>&1; then
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            echo "status=vulnerable" >> $GITHUB_OUTPUT
          fi

  # Job 4: Check for expired exceptions
  check-exceptions:
    name: Check Exceptions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Check for expired exceptions
        run: |
          echo "## Vulnerability Exceptions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if ./bin/cidx vuln check --days 7; then
            echo "No expired exceptions." >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action required**: Some vulnerability exceptions have expired." >> $GITHUB_STEP_SUMMARY
            echo "Run \`cidx vuln list\` to review and update or remove expired exceptions." >> $GITHUB_STEP_SUMMARY
          fi

  # Job 5: Summary
  summary:
    name: Summary
    needs: [get-images, trivy-scan, grype-scan, check-exceptions]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Report
        run: |
          echo "## Security Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy-scan.result == 'success' && 'All clean' || 'Vulnerabilities found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Grype | ${{ needs.grype-scan.result == 'success' && 'All clean' || 'Vulnerabilities found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Exceptions | ${{ needs.check-exceptions.result == 'success' && 'OK' || 'Review needed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images scanned: ${{ needs.get-images.outputs.count }}**" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.trivy-scan.result }}" != "success" ] || [ "${{ needs.grype-scan.result }}" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Some containers have HIGH/CRITICAL vulnerabilities." >> $GITHUB_STEP_SUMMARY
            echo "Check individual scan jobs for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
