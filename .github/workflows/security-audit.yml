name: Security Audit

on:
  schedule:
    # Run daily at 6:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db
  GRYPE_DB_AUTO_UPDATE: false

jobs:
  # Job 1: Get unique images and setup databases
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.images.outputs.images }}
      count: ${{ steps.images.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Get unique images
        id: images
        run: |
          IMAGES=$(./bin/cidx preset images --json | jq -c '[.[].image]')
          COUNT=$(echo "$IMAGES" | jq 'length')
          echo "images=$IMAGES" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Generate cache keys
        id: cache-keys
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "trivy=trivy-db-$DATE" >> $GITHUB_OUTPUT
          echo "grype=grype-db-$DATE" >> $GITHUB_OUTPUT

      - name: Cache Trivy DB
        id: trivy-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: ${{ steps.cache-keys.outputs.trivy }}
          restore-keys: trivy-db-

      - name: Download Trivy DB
        if: steps.trivy-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/trivy/db
          docker run --rm \
            -v ~/.cache/trivy:/root/.cache/trivy \
            aquasec/trivy:latest image --download-db-only
          sudo chown -R $USER:$USER ~/.cache/trivy

      - name: Cache Grype DB
        id: grype-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/grype
          key: ${{ steps.cache-keys.outputs.grype }}
          restore-keys: grype-db-

      - name: Download Grype DB
        if: steps.grype-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/grype/db
          docker run --rm \
            -v ~/.cache/grype:/root/.cache/grype \
            -e GRYPE_DB_CACHE_DIR=/root/.cache/grype/db \
            anchore/grype:latest db update
          sudo chown -R $USER:$USER ~/.cache/grype

      - name: Upload Trivy DB
        uses: actions/upload-artifact@v4
        with:
          name: trivy-db
          path: ~/.cache/trivy
          retention-days: 1

      - name: Upload Grype DB
        uses: actions/upload-artifact@v4
        with:
          name: grype-db
          path: ~/.cache/grype
          retention-days: 1

  # Job 2: Trivy scan (parallel)
  trivy-scan:
    name: Trivy
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.setup.outputs.images) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Download Trivy DB
        uses: actions/download-artifact@v4
        with:
          name: trivy-db
          path: ~/.cache/trivy

      - name: Generate ignore file
        run: |
          IMAGE="${{ matrix.image }}"
          ./bin/cidx vuln ignore --format trivy -o .trivyignore "$IMAGE"

      - name: Scan and save results
        id: scan
        run: |
          IMAGE="${{ matrix.image }}"
          SAFE_NAME=$(echo "$IMAGE" | tr '/:' '_')
          mkdir -p results

          # Run scan and capture output (don't fail yet)
          docker run --rm \
            -v "$(pwd)/.trivyignore:/root/.trivyignore:ro" \
            -v "$HOME/.cache/trivy:/root/.cache/trivy" \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --ignorefile /root/.trivyignore \
            --skip-db-update \
            --format json \
            "$IMAGE" > results/trivy-${SAFE_NAME}.json 2>&1 || true

          # Also get table format for display
          docker run --rm \
            -v "$(pwd)/.trivyignore:/root/.trivyignore:ro" \
            -v "$HOME/.cache/trivy:/root/.cache/trivy" \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --ignorefile /root/.trivyignore \
            --skip-db-update \
            "$IMAGE" > results/trivy-${SAFE_NAME}.txt 2>&1 || true

          # Check if vulnerabilities found
          if docker run --rm \
            -v "$(pwd)/.trivyignore:/root/.trivyignore:ro" \
            -v "$HOME/.cache/trivy:/root/.cache/trivy" \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --ignorefile /root/.trivyignore \
            --skip-db-update \
            --exit-code 1 \
            --quiet \
            "$IMAGE" 2>/dev/null; then
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            echo "status=vulnerable" >> $GITHUB_OUTPUT
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ strategy.job-index }}
          path: results/
          retention-days: 1

      - name: Fail if vulnerable
        if: steps.scan.outputs.status == 'vulnerable'
        run: exit 1

  # Job 3: Grype scan (parallel)
  grype-scan:
    name: Grype
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.setup.outputs.images) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Download Grype DB
        uses: actions/download-artifact@v4
        with:
          name: grype-db
          path: ~/.cache/grype

      - name: Generate ignore file
        run: |
          IMAGE="${{ matrix.image }}"
          ./bin/cidx vuln ignore --format grype -o .grype.yaml "$IMAGE"

      - name: Scan and save results
        id: scan
        run: |
          IMAGE="${{ matrix.image }}"
          SAFE_NAME=$(echo "$IMAGE" | tr '/:' '_')
          mkdir -p results

          # Run scan and capture output
          docker run --rm \
            -v "$(pwd)/.grype.yaml:/.grype.yaml:ro" \
            -v "$HOME/.cache/grype:/root/.cache/grype:ro" \
            -e GRYPE_DB_AUTO_UPDATE=false \
            -e GRYPE_DB_CACHE_DIR=/root/.cache/grype/db \
            anchore/grype:latest \
            "registry:$IMAGE" \
            --config /.grype.yaml \
            -o json > results/grype-${SAFE_NAME}.json 2>&1 || true

          # Also get table format
          docker run --rm \
            -v "$(pwd)/.grype.yaml:/.grype.yaml:ro" \
            -v "$HOME/.cache/grype:/root/.cache/grype:ro" \
            -e GRYPE_DB_AUTO_UPDATE=false \
            -e GRYPE_DB_CACHE_DIR=/root/.cache/grype/db \
            anchore/grype:latest \
            "registry:$IMAGE" \
            --config /.grype.yaml > results/grype-${SAFE_NAME}.txt 2>&1 || true

          # Check if vulnerabilities found
          if docker run --rm \
            -v "$(pwd)/.grype.yaml:/.grype.yaml:ro" \
            -v "$HOME/.cache/grype:/root/.cache/grype:ro" \
            -e GRYPE_DB_AUTO_UPDATE=false \
            -e GRYPE_DB_CACHE_DIR=/root/.cache/grype/db \
            anchore/grype:latest \
            "registry:$IMAGE" \
            --config /.grype.yaml \
            --fail-on high \
            -q 2>/dev/null; then
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            echo "status=vulnerable" >> $GITHUB_OUTPUT
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: grype-${{ strategy.job-index }}
          path: results/
          retention-days: 1

      - name: Fail if vulnerable
        if: steps.scan.outputs.status == 'vulnerable'
        run: exit 1

  # Job 4: Check for expired exceptions
  check-exceptions:
    name: Check Exceptions
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Check for expired exceptions
        id: check
        run: |
          if ./bin/cidx vuln check --days 7; then
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "status=expired" >> $GITHUB_OUTPUT
          fi

  # Job 5: Generate consolidated report
  report:
    name: Report
    needs: [setup, trivy-scan, grype-scan, check-exceptions]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CIDX
        run: go build -o bin/cidx ./cmd/cidx

      - name: Download all scan results
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "{trivy,grype}-*"
          merge-multiple: true

      - name: Generate Report
        run: |
          TRIVY_STATUS="${{ needs.trivy-scan.result }}"
          GRYPE_STATUS="${{ needs.grype-scan.result }}"
          EXCEPTIONS_STATUS="${{ needs.check-exceptions.outputs.status }}"
          IMAGE_COUNT="${{ needs.setup.outputs.count }}"

          # Header
          echo "# 🔒 Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Images Scanned:** $IMAGE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Scanner Results Summary
          echo "## 📊 Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ "$TRIVY_STATUS" = "success" ]; then
            echo "| Trivy | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Trivy | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$GRYPE_STATUS" = "success" ]; then
            echo "| Grype | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Grype | ❌ Fail |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Vulnerability Details
          echo "## 🔍 Vulnerability Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Process Trivy results
          if ls artifacts/trivy-*.txt 1> /dev/null 2>&1; then
            echo "### Trivy Findings" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for file in artifacts/trivy-*.txt; do
              IMAGE_NAME=$(basename "$file" .txt | sed 's/^trivy-//' | tr '_' '/' | tr '_' ':')
              if grep -q "Total:" "$file" 2>/dev/null; then
                VULN_COUNT=$(grep -oP 'Total: \K\d+' "$file" 2>/dev/null || echo "0")
                if [ "$VULN_COUNT" != "0" ]; then
                  echo "<details>" >> $GITHUB_STEP_SUMMARY
                  echo "<summary>📦 <code>$IMAGE_NAME</code> - $VULN_COUNT vulnerabilities</summary>" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo '```' >> $GITHUB_STEP_SUMMARY
                  cat "$file" >> $GITHUB_STEP_SUMMARY
                  echo '```' >> $GITHUB_STEP_SUMMARY
                  echo "</details>" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                fi
              elif grep -qE "(HIGH|CRITICAL)" "$file" 2>/dev/null; then
                echo "<details>" >> $GITHUB_STEP_SUMMARY
                echo "<summary>📦 <code>$IMAGE_NAME</code> - vulnerabilities found</summary>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                cat "$file" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "</details>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          fi

          # Process Grype results
          if ls artifacts/grype-*.txt 1> /dev/null 2>&1; then
            echo "### Grype Findings" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for file in artifacts/grype-*.txt; do
              IMAGE_NAME=$(basename "$file" .txt | sed 's/^grype-//' | tr '_' '/' | tr '_' ':')
              if grep -qE "(High|Critical)" "$file" 2>/dev/null; then
                echo "<details>" >> $GITHUB_STEP_SUMMARY
                echo "<summary>📦 <code>$IMAGE_NAME</code> - vulnerabilities found</summary>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                cat "$file" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "</details>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          fi

          # Exception Status
          echo "## 📋 Vulnerability Exceptions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$EXCEPTIONS_STATUS" = "ok" ]; then
            echo "✅ All exceptions are valid and not expired." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Some exceptions have expired or will expire soon." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Current Exceptions List
          echo "### Current Exceptions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          EXCEPTIONS=$(./bin/cidx vuln list 2>/dev/null)
          if [ -n "$EXCEPTIONS" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$EXCEPTIONS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "_No exceptions configured_" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Next Steps
          if [ "$TRIVY_STATUS" != "success" ] || [ "$GRYPE_STATUS" != "success" ]; then
            echo "## 🛠️ Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "1. Review vulnerability details above" >> $GITHUB_STEP_SUMMARY
            echo "2. For accepted risks, add exceptions:" >> $GITHUB_STEP_SUMMARY
            echo '   ```bash' >> $GITHUB_STEP_SUMMARY
            echo '   cidx vuln add <CVE-ID> <IMAGE>' >> $GITHUB_STEP_SUMMARY
            echo '   ```' >> $GITHUB_STEP_SUMMARY
            echo "3. Verify exceptions work locally:" >> $GITHUB_STEP_SUMMARY
            echo '   ```bash' >> $GITHUB_STEP_SUMMARY
            echo '   cidx vuln verify' >> $GITHUB_STEP_SUMMARY
            echo '   ```' >> $GITHUB_STEP_SUMMARY
            echo "4. Commit and push changes" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Final Status
        run: |
          if [ "${{ needs.trivy-scan.result }}" = "success" ] && [ "${{ needs.grype-scan.result }}" = "success" ]; then
            echo "✅ All security scans passed!"
          else
            echo "❌ Security vulnerabilities detected"
            exit 1
          fi
