# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║                     CIDX Configuration (Dogfooding!)                      ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
#
# Project Workflow: Trunk-Based Development with Manual Releases
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 📝 Daily Development (Pull Requests)
# ────────────────────────────────────────
#   1. Create feature branch & draft PR:  cidx action pr create "feat: title"
#   2. Implement feature & commit:        git commit -m "feat: ..." && git push
#   3. Mark PR ready for review:          cidx action pr ready
#   4. Merge to main:                     cidx action pr merge
#   ➡️  Result: Code merged to main, NO TAG created
#
# 🚀 Release Workflow (Manual, Grouped PRs)
# ────────────────────────────────────────
#   After 3-5 PRs merged to main, create a release:
#
#   cidx action release create
#
#   ➡️  Result:
#      - Analyzes commits since last tag
#      - Bumps version (PATCH/MINOR/MAJOR based on conventional commits)
#      - Creates version bump commit
#      - Creates and pushes git tag (e.g., v1.1.1)
#      - Triggers GitHub Release workflow
#      - Publishes release with binary + Docker image
#
# 📊 Pipeline Strategy
# ────────────────────────────────────────
#   • PR pipeline:      security + code + test (no build)
#   • Main pipeline:    security + code + test + build
#   • Release pipeline: full pipeline + docker + github release
#
# 🎯 Key Principle: Tags = Releases (1:1 mapping)
# ────────────────────────────────────────
#   • PRs do NOT create tags
#   • Releases are triggered MANUALLY via action
#   • One tag = One release = Grouped set of features/fixes
#
# Workspace: Current directory (auto-detected)

# Security: Scan for vulnerabilities and secrets
[security]
tools = ["trivy", "gitleaks"]

# Code Quality: Linting and formatting
[code]
tools = ["prettier", "golangci-lint", "commitizen"]

# Prettier: Auto-format files
[prettier]
write = true

# Testing: Run Go tests and BDD scenarios
[test]
tools = ["go-test"]
# TODO: Re-enable godog when all BDD scenarios are implemented
# tools = ["go-test", "godog"]

# Build: Compile the binary
# Version is automatically injected from VERSION file
[build]
tools = ["go-build"]

# Docker: Build and push container images
[docker]
tools = ["kaniko"]

# Version: Bump version with commitizen
[version]
tools = ["version-bump"]

# Release: Create GitHub releases
[release]
tools = ["gh-release"]

# Tool override for version bumping
[tools.version-bump]
phase = "version"
image = "commitizen/commitizen:latest"
command = "cz bump --yes"
workdir = "/app"
volumes = [
    "${WORKSPACE}:/app",
    "${WORKSPACE}/.git:/app/.git",
]

# Actions: Automated workflows
[actions.release-create]
description = "Create new release with version bump"
image = "commitizen/commitizen:latest"
command = "bump --yes --no-verify"
workdir = "/app"
volumes = [
    "${WORKSPACE}:/app",
    "${WORKSPACE}/.git:/app/.git",
]
auto_push = true
push_tags = true
watch_workflow = true

[actions.release-create.env]
GIT_CONFIG_GLOBAL = "/tmp/.gitconfig"
GIT_CONFIG_COUNT = "1"
GIT_CONFIG_KEY_0 = "safe.directory"
GIT_CONFIG_VALUE_0 = "/app"

# Pipelines: Named execution workflows
# CI: Continuous Integration (every commit)
[pipelines.ci]
phases = ["security", "code", "test", "build"]
description = "Full CI pipeline for all commits"

# PR: Pull Request validation
[pipelines.pr]
phases = ["security", "code", "test"]
description = "Pull request validation (no build artifacts)"

# Main: Main branch pipeline
[pipelines.main]
phases = ["security", "code", "test", "build"]
description = "Main branch pipeline (builds artifacts)"

# Release: Full release pipeline (tags only)
[pipelines.release]
phases = ["security", "code", "test", "build", "release", "docker"]
description = "Complete release pipeline (CI only)"

# CD: Continuous Deployment
[pipelines.publish]
phases = ["release", "docker"]
description = "Publish artifacts to registries (GitHub Releases + GHCR)"

# Quick: Fast validation
[pipelines.quick]
phases = ["code"]
description = "Quick code quality check"

# Pre-push: Local pre-push validation
[pipelines.pre-push]
phases = ["security", "code", "test"]
description = "Local validation before pushing"

# Trivy: Scan filesystem for vulnerabilities
[tools.trivy]
severity = "HIGH,CRITICAL"
exit_code = 0  # Don't fail on vulnerabilities (yet)

# Gitleaks: Check for secrets in git history
# Uses default configuration
