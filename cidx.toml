# cidx — dogfooded config (used by `cidx run ci`, `cidx run docker`, ...).
#
# This is the minimal, functional config for building cidx itself.
# For the full catalog of options, defaults, and worked examples, see:
#   examples/cidx-complete.toml      (every option, every section, fully commented)
#   examples/cidx.toml               (minimal starter)
#   examples/cidx-advanced.toml      (small custom config)

# ─── release & tag workflow (used by `cidx action release`, `cidx action tag`) ───
[release_workflow]
main_branch = "main"
allow_release_from_any_branch = true

[tag_workflow]
prefix = "v"
use_commitizen = true
auto_push = true
require_annotated = true
protected_tags = ["v1.*"]
linked_to_release = true

# ─── phases ───
[security]
containers = ["trivy", "gitleaks"]

[code]
containers = ["prettier", "golangci-lint", "commitizen", "shellcheck"]

[test]
containers = ["go-test"]

[build]
containers = ["go-build"]

[docker]
containers = ["kaniko"]

[release]
containers = ["gh-release"]

# ─── container overrides ───
[containers.trivy]
severity = "HIGH,CRITICAL"
exit_code = 0

[containers.prettier]
write = true

# ─── pipelines ───
[pipelines.ci]
phases = ["security", "code", "test", "build"]
description = "Full CI pipeline for all commits"

[pipelines.pr]
phases = ["security", "code", "test"]
description = "Pull request validation (no build artifacts)"

[pipelines.main]
phases = ["security", "code", "test", "build"]
description = "Main branch pipeline (builds artifacts)"

[pipelines.release]
phases = ["security", "code", "test", "build", "docker", "release"]
description = "Complete release pipeline"

# ─── release-create action (commitizen-based version bump + tag + push) ───
[actions.release-create]
description = "Create new release with version bump"
image = "commitizen/commitizen:latest"
command = "bump --yes --no-verify"
workdir = "/app"
volumes = [
    "${WORKSPACE}:/app",
    "${WORKSPACE}/.git:/app/.git",
]
auto_push = true
push_tags = true
watch_workflow = true

[actions.release-create.env]
GIT_CONFIG_GLOBAL = "/tmp/.gitconfig"
GIT_CONFIG_COUNT = "1"
GIT_CONFIG_KEY_0 = "safe.directory"
GIT_CONFIG_VALUE_0 = "/app"
