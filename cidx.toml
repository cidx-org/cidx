# CIDX Configuration for CIDX itself (dogfooding!)
#
# This configuration runs CIDX's own CI/CD pipeline
# Workspace: Current directory (auto-detected)

# Security: Scan for vulnerabilities and secrets
[security]
tools = ["trivy", "gitleaks"]

# Code Quality: Linting and formatting
[code]
tools = ["prettier", "golangci-lint"]

# Prettier: Auto-format files
[prettier]
write = true

# Testing: Run Go tests and BDD scenarios
[test]
tools = ["go-test", "godog"]

# Build: Compile the binary
[build]
tools = ["go-build"]

# Docker: Build and push container images
[docker]
tools = ["docker-buildx"]

# Release: Create GitHub releases
[release]
tools = ["gh-release"]

# Pipelines: Named execution workflows
# CI: Continuous Integration (every commit)
[pipelines.ci]
phases = ["security", "code", "test", "build"]
description = "Full CI pipeline for all commits"

# PR: Pull Request validation
[pipelines.pr]
phases = ["security", "code", "test"]
description = "Pull request validation (no build artifacts)"

# Main: Main branch pipeline
[pipelines.main]
phases = ["security", "code", "test", "build"]
description = "Main branch pipeline (builds artifacts)"

# Release: Full release pipeline (tags only)
[pipelines.release]
phases = ["security", "code", "test", "build", "release", "docker"]
description = "Complete release pipeline (CI only)"

# CD: Continuous Deployment
[pipelines.cd]
phases = ["release", "docker"]
description = "Deployment pipeline (requires artifacts)"

# Quick: Fast validation
[pipelines.quick]
phases = ["code"]
description = "Quick code quality check"

# Pre-push: Local pre-push validation
[pipelines.pre-push]
phases = ["security", "code", "test"]
description = "Local validation before pushing"

# Trivy: Scan filesystem for vulnerabilities
[tools.trivy]
severity = "HIGH,CRITICAL"
exit_code = 0  # Don't fail on vulnerabilities (yet)

# Gitleaks: Check for secrets in git history
# Uses default configuration
