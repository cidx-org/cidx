# CIDX Configuration - Advanced
#
# A fuller example with separate local and CI pipelines plus minimal overrides.

[security]
containers = ["trivy", "gitleaks"]

[code]
containers = ["prettier", "commitlint"]

[test]
containers = ["go-test"]

[pipelines.quick]
phases = ["security"]

[pipelines.ci]
phases = ["security", "code", "test"]

[containers.trivy]
severity = "HIGH,CRITICAL"
exit_code = 1

[containers.prettier]
write = true

# Mount contract:
# All built-in presets mount the workspace at /work (unified since #151).
# If you override `workdir`, keep it under the volume mount target — or
# override `volumes` to match. CIDX refuses to run when workdir falls
# outside every mounted target (silent "no files found" was the previous
# behavior).
#
# Monorepo example: scope prettier to a subdirectory.
# [containers.prettier]
# workdir = "/work/client-react"          # under /work, OK
#
# Or remount at a custom path:
# [containers.prettier]
# workdir = "/src/client-react"
# volumes = ["${WORKSPACE}/client-react:/src/client-react"]

# Custom container declaration: when [containers.NAME] has an `image` field
# and NAME is not a built-in preset, CIDX treats it as a brand-new container
# rather than an override. All preset fields (phase, image, command, workdir,
# volumes, entrypoint, env, pull_policy, timeout) can be set inline.
[containers.pytest-custom]
phase = "test"
image = "python:3.12-slim"
command = "pytest tests/integration"
workdir = "/work"
volumes = ["${WORKSPACE}:/work"]
env = { PYTHONDONTWRITEBYTECODE = "1" }
