# CIDX Configuration - Advanced
#
# Workspace: By default, CIDX uses the current directory as the workspace.
# All containers will be executed in the directory where you run the command.

[security]
containers = ["trivy", "gitleaks"]

[code]
containers = ["prettier", "commitlint"]

[containers.trivy]
severity = "HIGH,CRITICAL"
exit_code = 1

[containers.prettier]
write = true
